<script>
let lastReport = null;

// ==========================
// 基础工具
// ==========================
function num(id){
    return Number(document.getElementById(id).value);
}

function text(id){
    return document.getElementById(id).value.trim();
}

function avg(arr){
    if(!arr.length) return 0;
    return arr.reduce((a,b)=>a+b,0) / arr.length;
}

function max(arr){
    return Math.max(...arr);
}

function min(arr){
    return Math.min(...arr);
}

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve, ms));
}

function fmtTime(ts){
    let d = new Date(ts);
    return d.toISOString().replace("T"," ").slice(0,16);
}

function setOut(s){
    document.getElementById("out").innerText = s;
}

// ==========================
// 读取参数
// ==========================
function readParams(){
    return {
        apiBase:text("apiBase").replace(/\/$/,""),
        symbol:text("symbol").toUpperCase(),
        symbols:text("symbols").split(",").map(x=>x.trim().toUpperCase()).filter(Boolean),
        interval:text("interval"),
        bars:num("bars"),

        initialCapital:num("initialCapital"),

        riskPct:num("riskPct") / 100,
        stopLossPct:num("stopLoss") / 100,
        takeProfitPct:num("takeProfit") / 100,
        maxExposure:num("maxExposure"),
        maxDDLimit:num("maxDDLimit") / 100,
        feePct:num("feePct") / 100,
        slippagePct:num("slippagePct") / 100,

        enableLong:num("enableLong") === 1,
        minScoreLong:num("minScoreLong"),

        enableShort:num("enableShort") === 1,
        minScoreShort:num("minScoreShort"),

        enableRange:num("enableRange") === 1,

        maxChasePct:num("maxChasePct") / 100,

        tradeCooldown:num("tradeCooldown"),
        lossStreakLimit:num("lossStreakLimit"),
        lossCooldown:num("lossCooldown"),

        maxBarsHeld:100
    };
}

// ==========================
// Binance 真实K线拉取
// USD-M Futures: /fapi/v1/klines
// 每次最多1500根，向前分页
// ==========================
async function fetchRealKlines(params, symbol){
    let all = [];
    let endTime = null;
    let target = params.bars;
    let batchLimit = 1500;

    while(all.length < target){
        let limit = Math.min(batchLimit, target - all.length);

        let url = `${params.apiBase}/fapi/v1/klines?symbol=${symbol}&interval=${params.interval}&limit=${limit}`;

        if(endTime){
            url += `&endTime=${endTime}`;
        }

        setOut(`正在拉取真实K线...\n交易对：${symbol}\n周期：${params.interval}\n已获取：${all.length}/${target}`);

        let res;

        try{
            res = await fetch(url);
        }catch(e){
            throw new Error("网络请求失败。可能是 Binance 访问受限、浏览器跨域、网络问题。错误：" + e.message);
        }

        if(!res.ok){
            let body = await res.text();
            throw new Error(`Binance接口错误：HTTP ${res.status}\n${body}`);
        }

        let data = await res.json();

        if(!Array.isArray(data) || data.length === 0){
            break;
        }

        all = data.concat(all);

        let firstOpenTime = data[0][0];
        endTime = firstOpenTime - 1;

        if(data.length < limit){
            break;
        }

        await sleep(180);
    }

    // 去重 + 排序
    let map = new Map();

    for(let k of all){
        map.set(k[0], k);
    }

    let unique = Array.from(map.values()).sort((a,b)=>a[0]-b[0]);

    // 删除未收盘K线
    let now = Date.now();
    unique = unique.filter(k => k[6] < now);

    // 只保留最后 target 根
    unique = unique.slice(-target);

    let bars = unique.map(k=>({
        openTime:Number(k[0]),
        open:Number(k[1]),
        high:Number(k[2]),
        low:Number(k[3]),
        close:Number(k[4]),
        vol:Number(k[5]),
        closeTime:Number(k[6])
    }));

    if(bars.length < 200){
        throw new Error(`K线数量太少：${bars.length}，无法回测`);
    }

    return bars;
}

// ==========================
// EMA / ATR
// ==========================
function ema(values, period){
    if(values.length === 0) return 0;

    let k = 2 / (period + 1);
    let e = values[0];

    for(let i=1;i<values.length;i++){
        e = values[i] * k + e * (1-k);
    }

    return e;
}

function atr(data, i, period){
    let trs = [];

    for(let j=i-period+1;j<=i;j++){
        if(j <= 0) continue;

        let h = data[j].high;
        let l = data[j].low;
        let pc = data[j-1].close;

        trs.push(Math.max(
            h-l,
            Math.abs(h-pc),
            Math.abs(l-pc)
        ));
    }

    return avg(trs);
}

// ==========================
// 市场状态识别
// ==========================
function marketState(d, i){
    if(i < 150) return {
        state:"UNKNOWN",
        ema20:0,
        ema80:0,
        atrPct:0,
        trendStrength:0,
        slope:0
    };

    let s120 = d.slice(i-120, i);
    let s60 = d.slice(i-60, i);
    let s30 = d.slice(i-30, i);

    let closes120 = s120.map(x=>x.close);
    let closes60 = s60.map(x=>x.close);
    let closes30 = s30.map(x=>x.close);

    let ema20 = ema(closes120, 20);
    let ema80 = ema(closes120, 80);

    let ema20Now = ema(closes30, 20);
    let ema20Past = ema(closes60.slice(0,30), 20);

    let slope = (ema20Now - ema20Past) / d[i].close;

    let currentAtr = atr(d, i, 14);
    let atrPct = currentAtr / d[i].close;

    let trendStrength = Math.abs(ema20 - ema80) / d[i].close;

    if(atrPct > 0.035){
        return {
            state:"VOLATILE",
            ema20,
            ema80,
            atrPct,
            trendStrength,
            slope
        };
    }

    if(ema20 > ema80 && slope > 0.0005 && trendStrength > 0.004){
        return {
            state:"TREND_UP",
            ema20,
            ema80,
            atrPct,
            trendStrength,
            slope
        };
    }

    if(ema20 < ema80 && slope < -0.0005 && trendStrength > 0.004){
        return {
            state:"TREND_DOWN",
            ema20,
            ema80,
            atrPct,
            trendStrength,
            slope
        };
    }

    return {
        state:"RANGE",
        ema20,
        ema80,
        atrPct,
        trendStrength,
        slope
    };
}

// ==========================
// 风险过滤
// ==========================
function riskFilter(d, i){
    let c = d[i];

    let body = Math.max(Math.abs(c.open - c.close), c.close * 0.0001);
    let upperWick = c.high - Math.max(c.open, c.close);
    let lowerWick = Math.min(c.open, c.close) - c.low;

    // 防插针
    if(upperWick / body > 4 || lowerWick / body > 4){
        return false;
    }

    // 防极端单根波动
    let rangePct = (c.high - c.low) / c.close;

    if(rangePct > 0.035){
        return false;
    }

    return true;
}

// ==========================
// TREND_LONG 评分
// ==========================
function scoreTrendLong(d, i, ms){
    let s20 = d.slice(i-20, i);
    let s50 = d.slice(i-50, i);

    let price = d[i].close;
    let prevHigh20 = max(s20.map(x=>x.high));
    let prevHigh50 = max(s50.map(x=>x.high));
    let volAvg20 = avg(s20.map(x=>x.vol));

    let score = 0;
    let reasons = [];

    if(ms.state === "TREND_UP"){
        score++;
        reasons.push("TREND_UP");
    }

    if(price > prevHigh20){
        score++;
        reasons.push("突破20高");
    }

    if(price > prevHigh50 * 0.995){
        score++;
        reasons.push("接近/突破50高");
    }

    if(ms.ema20 > ms.ema80){
        score++;
        reasons.push("EMA多头");
    }

    if(ms.slope > 0.0005){
        score++;
        reasons.push("斜率向上");
    }

    if(d[i].vol > volAvg20 * 1.2){
        score++;
        reasons.push("放量");
    }

    if(ms.atrPct > 0.003 && ms.atrPct < 0.03){
        score++;
        reasons.push("ATR正常");
    }

    return {score, reasons};
}

// ==========================
// TREND_SHORT 评分
// ==========================
function scoreTrendShort(d, i, ms){
    let s20 = d.slice(i-20, i);
    let s50 = d.slice(i-50, i);

    let price = d[i].close;
    let prevLow20 = min(s20.map(x=>x.low));
    let prevLow50 = min(s50.map(x=>x.low));
    let volAvg20 = avg(s20.map(x=>x.vol));

    let score = 0;
    let reasons = [];

    if(ms.state === "TREND_DOWN"){
        score++;
        reasons.push("TREND_DOWN");
    }

    if(price < prevLow20){
        score++;
        reasons.push("跌破20低");
    }

    if(price < prevLow50 * 1.005){
        score++;
        reasons.push("接近/跌破50低");
    }

    if(ms.ema20 < ms.ema80){
        score++;
        reasons.push("EMA空头");
    }

    if(ms.slope < -0.0005){
        score++;
        reasons.push("斜率向下");
    }

    if(d[i].vol > volAvg20 * 1.2){
        score++;
        reasons.push("放量");
    }

    if(ms.atrPct > 0.003 && ms.atrPct < 0.03){
        score++;
        reasons.push("ATR正常");
    }

    return {score, reasons};
}

// ==========================
// RANGE 策略，默认关闭
// ==========================
function rangeSignal(d, i){
    let s20 = d.slice(i-20, i);
    let mean = avg(s20.map(x=>x.close));
    let currentAtr = atr(d, i, 14);
    let price = d[i].close;

    if(price < mean - currentAtr * 1.2){
        return {
            direction:"LONG",
            strategy:"RANGE_LONG",
            score:3,
            reasons:["均值回归做多"]
        };
    }

    if(price > mean + currentAtr * 1.2){
        return {
            direction:"SHORT",
            strategy:"RANGE_SHORT",
            score:3,
            reasons:["均值回归做空"]
        };
    }

    return null;
}

// ==========================
// 信号函数
// 信号在第 i 根K线收盘确认
// 下一根K线开盘执行
// ==========================
function signal(d, i, params){
    if(i < 160) return null;

    if(!riskFilter(d, i)) return null;

    let ms = marketState(d, i);

    if(ms.state === "UNKNOWN" || ms.state === "VOLATILE"){
        return null;
    }

    let price = d[i].close;

    if(params.enableLong && ms.state === "TREND_UP"){
        let longScore = scoreTrendLong(d, i, ms);
        let chasePct = (price - ms.ema20) / price;

        if(
            longScore.score >= params.minScoreLong &&
            chasePct <= params.maxChasePct
        ){
            return {
                direction:"LONG",
                strategy:"TREND_LONG",
                score:longScore.score,
                reasons:longScore.reasons.concat([
                    "追高距离：" + (chasePct*100).toFixed(2) + "%"
                ]),
                marketState:ms.state
            };
        }
    }

    if(params.enableShort && ms.state === "TREND_DOWN"){
        let shortScore = scoreTrendShort(d, i, ms);
        let chasePct = (ms.ema20 - price) / price;

        if(
            shortScore.score >= params.minScoreShort &&
            chasePct <= params.maxChasePct
        ){
            return {
                direction:"SHORT",
                strategy:"TREND_SHORT",
                score:shortScore.score,
                reasons:shortScore.reasons.concat([
                    "追空距离：" + (chasePct*100).toFixed(2) + "%"
                ]),
                marketState:ms.state
            };
        }
    }

    if(params.enableRange){
        let r = rangeSignal(d, i);

        if(r){
            return {
                ...r,
                marketState:ms.state
            };
        }
    }

    return null;
}

// ==========================
// 仓位模型
// ==========================
function calcNotional(capital, riskPct, stopLossPct, maxExposure){
    let riskAmount = capital * riskPct;
    let rawNotional = riskAmount / stopLossPct;
    let maxNotional = capital * maxExposure;

    return Math.min(rawNotional, maxNotional);
}

// ==========================
// 开仓
// ==========================
function openPosition(sig, rawPrice, capital, params, entryIndex){
    let notional = calcNotional(
        capital,
        params.riskPct,
        params.stopLossPct,
        params.maxExposure
    );

    if(notional <= 0) return null;

    let entry;

    if(sig.direction === "LONG"){
        entry = rawPrice * (1 + params.slippagePct);
    }else{
        entry = rawPrice * (1 - params.slippagePct);
    }

    let openFee = notional * params.feePct;

    return {
        direction:sig.direction,
        strategy:sig.strategy,
        score:sig.score,
        reasons:sig.reasons,
        marketState:sig.marketState,
        entry,
        notional,
        openFee,
        barsHeld:0,
        entryIndex
    };
}

// ==========================
// 平仓判断
// ==========================
function checkExit(pos, bar, params){
    pos.barsHeld++;

    let sl = params.stopLossPct;
    let tp = params.takeProfitPct;

    let exitPrice = null;
    let reason = null;

    if(pos.direction === "LONG"){
        let stop = pos.entry * (1 - sl);
        let take = pos.entry * (1 + tp);

        // 同一根K线同时触发，保守按止损
        if(bar.low <= stop){
            exitPrice = stop * (1 - params.slippagePct);
            reason = "STOP";
        }else if(bar.high >= take){
            exitPrice = take * (1 - params.slippagePct);
            reason = "TAKE";
        }
    }

    if(pos.direction === "SHORT"){
        let stop = pos.entry * (1 + sl);
        let take = pos.entry * (1 - tp);

        if(bar.high >= stop){
            exitPrice = stop * (1 + params.slippagePct);
            reason = "STOP";
        }else if(bar.low <= take){
            exitPrice = take * (1 + params.slippagePct);
            reason = "TAKE";
        }
    }

    if(!exitPrice && pos.barsHeld >= params.maxBarsHeld){
        exitPrice = bar.close;
        reason = "TIME_EXIT";
    }

    if(!exitPrice) return null;

    return {exitPrice, reason};
}

// ==========================
// 最终强制平仓
// ==========================
function finalExitPrice(pos, rawPrice, params){
    if(pos.direction === "LONG"){
        return rawPrice * (1 - params.slippagePct);
    }

    return rawPrice * (1 + params.slippagePct);
}

// ==========================
// 平仓PnL
// 手续费只在这里统一扣一次
// ==========================
function closePosition(pos, exitPrice, capital, params){
    let directionNum = pos.direction === "LONG" ? 1 : -1;

    let pnlPct = directionNum * (exitPrice - pos.entry) / pos.entry;
    let grossPnl = pos.notional * pnlPct;
    let closeFee = pos.notional * params.feePct;
    let totalFee = pos.openFee + closeFee;
    let netPnl = grossPnl - totalFee;

    let capitalBefore = capital;
    let capitalAfter = capital + netPnl;

    return {
        capitalAfter,
        trade:{
            direction:pos.direction,
            strategy:pos.strategy,
            marketState:pos.marketState,
            score:pos.score,
            reasons:pos.reasons,
            entry:pos.entry,
            exit:exitPrice,
            notional:pos.notional,
            pnlPct,
            grossPnl,
            openFee:pos.openFee,
            closeFee,
            totalFee,
            netPnl,
            returnOnCapital:netPnl / capitalBefore,
            barsHeld:pos.barsHeld
        }
    };
}

// ==========================
// 分策略统计
// ==========================
function calcStrategyStats(trades){
    let map = {};

    for(let t of trades){
        if(!map[t.strategy]){
            map[t.strategy] = {
                count:0,
                wins:0,
                losses:0,
                netPnl:0,
                grossProfit:0,
                grossLoss:0,
                avgScore:0,
                avgBarsHeld:0
            };
        }

        let s = map[t.strategy];

        s.count++;
        s.netPnl += t.netPnl;
        s.avgScore += t.score || 0;
        s.avgBarsHeld += t.barsHeld || 0;

        if(t.netPnl > 0){
            s.wins++;
            s.grossProfit += t.netPnl;
        }else{
            s.losses++;
            s.grossLoss += Math.abs(t.netPnl);
        }
    }

    for(let k in map){
        let s = map[k];

        s.winRate = s.count ? s.wins / s.count : 0;
        s.profitFactor = s.grossLoss === 0 ? 999 : s.grossProfit / s.grossLoss;
        s.avgScore = s.count ? s.avgScore / s.count : 0;
        s.avgBarsHeld = s.count ? s.avgBarsHeld / s.count : 0;
    }

    return map;
}

// ==========================
// 回测核心
// ==========================
function backtestRealData(d, params, symbol){
    let capital = params.initialCapital;
    let peak = params.initialCapital;
    let maxDD = 0;

    let position = null;
    let trades = [];

    let cooldown = 0;
    let consecutiveLoss = 0;

    let stoppedReason = "正常完成";

    let skipped = {
        cooldown:0,
        noSignal:0
    };

    let stateCounts = {
        UNKNOWN:0,
        VOLATILE:0,
        TREND_UP:0,
        TREND_DOWN:0,
        RANGE:0
    };

    function updateDrawdown(){
        if(capital > peak){
            peak = capital;
        }

        let dd = (peak - capital) / peak;

        if(dd > maxDD){
            maxDD = dd;
        }

        return dd;
    }

    for(let i=170;i<d.length-1;i++){

        let ms = marketState(d, i);
        stateCounts[ms.state] = (stateCounts[ms.state] || 0) + 1;

        if(capital <= 0){
            capital = 0;
            stoppedReason = "资金归零";
            break;
        }

        let dd = updateDrawdown();

        if(dd >= params.maxDDLimit){
            stoppedReason = "最大回撤超过限制，停止交易";
            break;
        }

        // 先管理持仓，用当前K线检查止盈止损
        if(position && i >= position.entryIndex){
            let exit = checkExit(position, d[i], params);

            if(exit){
                let result = closePosition(position, exit.exitPrice, capital, params);
                capital = result.capitalAfter;

                result.trade.reason = exit.reason;
                result.trade.capitalAfter = capital;
                result.trade.symbol = symbol;
                result.trade.exitTime = d[i].closeTime;

                trades.push(result.trade);

                if(result.trade.netPnl < 0){
                    consecutiveLoss++;
                }else{
                    consecutiveLoss = 0;
                }

                cooldown = Math.max(cooldown, params.tradeCooldown);

                if(consecutiveLoss >= params.lossStreakLimit){
                    cooldown = Math.max(cooldown, params.lossCooldown);
                    consecutiveLoss = 0;
                }

                position = null;

                dd = updateDrawdown();

                if(dd >= params.maxDDLimit){
                    stoppedReason = "最大回撤超过限制，停止交易";
                    break;
                }
            }
        }

        if(cooldown > 0){
            cooldown--;
            skipped.cooldown++;
            continue;
        }

        // 无持仓才开仓
        if(!position){
            let sig = signal(d, i, params);

            if(sig){
                let entryBar = d[i+1];

                position = openPosition(
                    sig,
                    entryBar.open,
                    capital,
                    params,
                    i+1
                );

                if(position){
                    position.entryTime = entryBar.openTime;
                }
            }else{
                skipped.noSignal++;
            }
        }
    }

    // 最后一根强制平仓
    if(position && capital > 0){
        let lastBar = d[d.length-1];
        let exitPrice = finalExitPrice(position, lastBar.close, params);
        let result = closePosition(position, exitPrice, capital, params);

        capital = result.capitalAfter;

        result.trade.reason = "FINAL_EXIT";
        result.trade.capitalAfter = capital;
        result.trade.symbol = symbol;
        result.trade.exitTime = lastBar.closeTime;

        trades.push(result.trade);

        updateDrawdown();
    }

    let wins = trades.filter(t=>t.netPnl > 0);
    let losses = trades.filter(t=>t.netPnl <= 0);

    let grossProfit = wins.reduce((a,b)=>a+b.netPnl,0);
    let grossLoss = Math.abs(losses.reduce((a,b)=>a+b.netPnl,0));

    let winRate = trades.length ? wins.length / trades.length : 0;
    let profitFactor = grossLoss === 0 ? 999 : grossProfit / grossLoss;

    let avgWin = wins.length ? grossProfit / wins.length : 0;
    let avgLoss = losses.length ? grossLoss / losses.length : 0;
    let totalFees = trades.reduce((a,b)=>a+b.totalFee,0);

    let strategyStats = calcStrategyStats(trades);

    return {
        version:"V7.5 Binance真实K线回测",
        symbol,
        interval:params.interval,
        dataBars:d.length,
        dataStart:fmtTime(d[0].openTime),
        dataEnd:fmtTime(d[d.length-1].closeTime),
        stoppedReason,
        initialCapital:params.initialCapital,
        finalCapital:capital,
        returnRate:(capital - params.initialCapital) / params.initialCapital,
        maxDrawdown:maxDD,
        tradesCount:trades.length,
        winRate,
        profitFactor,
        avgWin,
        avgLoss,
        totalFees,
        strategyStats,
        stateCounts,
        skipped,
        params:{
            riskPct:params.riskPct,
            stopLossPct:params.stopLossPct,
            takeProfitPct:params.takeProfitPct,
            maxExposure:params.maxExposure,
            maxDDLimit:params.maxDDLimit,
            feePct:params.feePct,
            slippagePct:params.slippagePct,
            enableLong:params.enableLong,
            minScoreLong:params.minScoreLong,
            enableShort:params.enableShort,
            minScoreShort:params.minScoreShort,
            enableRange:params.enableRange,
            maxChasePct:params.maxChasePct,
            tradeCooldown:params.tradeCooldown,
            lossStreakLimit:params.lossStreakLimit,
            lossCooldown:params.lossCooldown
        },
        lastTrades:trades.slice(-50)
    };
}

// ==========================
// 单币种真实回测
// ==========================
async function runSingleReal(){
    let params = readParams();

    try{
        setOut("准备拉取真实K线...");
        let d = await fetchRealKlines(params, params.symbol);
        let report = backtestRealData(d, params, params.symbol);

        lastReport = report;

        displaySingleReport(report);
    }catch(e){
        setOut("❌ 回测失败：\n\n" + e.message);
    }
}

// ==========================
// 多币种真实测试
// ==========================
async function runMultiReal(){
    let params = readParams();
    let reports = [];

    try{
        for(let i=0;i<params.symbols.length;i++){
            let sym = params.symbols[i];

            setOut(`正在测试多币种...\n进度：${i+1}/${params.symbols.length}\n当前：${sym}`);

            let d = await fetchRealKlines(params, sym);
            let r = backtestRealData(d, params, sym);

            reports.push(r);

            await sleep(300);
        }

        let validPF = reports.map(r=>r.profitFactor >= 999 ? 10 : r.profitFactor);

        let avgReturn = avg(reports.map(r=>r.returnRate));
        let avgDD = avg(reports.map(r=>r.maxDrawdown));
        let avgPF = avg(validPF);
        let avgTrades = avg(reports.map(r=>r.tradesCount));
        let positive = reports.filter(r=>r.returnRate > 0).length;
        let ddStop = reports.filter(r=>r.stoppedReason.includes("最大回撤")).length;

        let best = reports.reduce((a,b)=>a.returnRate > b.returnRate ? a : b);
        let worst = reports.reduce((a,b)=>a.returnRate < b.returnRate ? a : b);

        lastReport = {
            version:"V7.5 Binance真实K线多币种测试",
            interval:params.interval,
            bars:params.bars,
            symbols:params.symbols,
            aggregate:{
                avgReturn,
                avgDrawdown:avgDD,
                avgProfitFactor:avgPF,
                avgTrades,
                positiveRuns:positive,
                positiveRate:positive / reports.length,
                stoppedByDD:ddStop,
                best:{
                    symbol:best.symbol,
                    returnRate:best.returnRate,
                    finalCapital:best.finalCapital,
                    profitFactor:best.profitFactor
                },
                worst:{
                    symbol:worst.symbol,
                    returnRate:worst.returnRate,
                    finalCapital:worst.finalCapital,
                    profitFactor:worst.profitFactor
                }
            },
            reports:reports.map(r=>({
                symbol:r.symbol,
                interval:r.interval,
                dataStart:r.dataStart,
                dataEnd:r.dataEnd,
                finalCapital:r.finalCapital,
                returnRate:r.returnRate,
                maxDrawdown:r.maxDrawdown,
                tradesCount:r.tradesCount,
                winRate:r.winRate,
                profitFactor:r.profitFactor,
                totalFees:r.totalFees,
                stoppedReason:r.stoppedReason,
                strategyStats:r.strategyStats
            }))
        };

        displayMultiReport(lastReport);
    }catch(e){
        setOut("❌ 多币种测试失败：\n\n" + e.message);
    }
}

// ==========================
// 一键复制
// ==========================
function copyReport(){
    if(!lastReport){
        alert("请先运行回测");
        return;
    }

    let text = JSON.stringify(lastReport, null, 2);

    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(()=>{
            alert("已复制，可直接粘贴给ChatGPT分析");
        }).catch(()=>{
            fallbackCopy(text);
        });
    }else{
        fallbackCopy(text);
    }
}

function fallbackCopy(text){
    let textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
    alert("已复制，可直接粘贴给ChatGPT分析");
}
