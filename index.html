<script>
let lastReport = null;

// ==========================
// 基础工具
// ==========================
function num(id){
    return Number(document.getElementById(id).value);
}

function avg(arr){
    if(!arr.length) return 0;
    return arr.reduce((a,b)=>a+b,0) / arr.length;
}

function max(arr){
    return Math.max(...arr);
}

function min(arr){
    return Math.min(...arr);
}

// ==========================
// 可复现随机数
// ==========================
function mulberry32(seed){
    return function(){
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// ==========================
// 模拟K线生成：趋势 / 震荡 / 高波动
// ==========================
function genData(n, seed){
    let rnd = mulberry32(seed);
    let d = [];
    let price = 100;

    for(let i=0;i<n;i++){

        let cycle = i % 5000;
        let drift = 0;
        let volBoost = 1;

        if(cycle >= 500 && cycle < 1700){
            drift = 0.00045;
            volBoost = 1.15;
        }

        if(cycle >= 1700 && cycle < 3000){
            drift = 0;
            volBoost = 0.75;
        }

        if(cycle >= 3000 && cycle < 4200){
            drift = -0.00045;
            volBoost = 1.15;
        }

        if(cycle >= 4200){
            drift = 0;
            volBoost = 2.6;
        }

        let noise = (rnd() - 0.5) * 0.012 * volBoost;
        let ret = drift + noise;

        let open = price;
        let close = Math.max(1, open * (1 + ret));

        let wick = rnd() * 0.006 * volBoost;
        let high = Math.max(open, close) * (1 + wick);
        let low = Math.min(open, close) * (1 - wick);
        let volume = 100 + rnd() * 180 * volBoost;

        price = close;

        d.push({
            open,
            high,
            low,
            close,
            vol: volume
        });
    }

    return d;
}

// ==========================
// EMA / ATR
// ==========================
function ema(values, period){
    if(values.length === 0) return 0;

    let k = 2 / (period + 1);
    let e = values[0];

    for(let i=1;i<values.length;i++){
        e = values[i] * k + e * (1 - k);
    }

    return e;
}

function atr(data, i, period){
    let trs = [];

    for(let j=i-period+1;j<=i;j++){
        if(j <= 0) continue;

        let h = data[j].high;
        let l = data[j].low;
        let pc = data[j-1].close;

        trs.push(Math.max(
            h - l,
            Math.abs(h - pc),
            Math.abs(l - pc)
        ));
    }

    return avg(trs);
}

// ==========================
// 市场状态识别
// ==========================
function marketState(d, i){
    if(i < 150) return {
        state:"UNKNOWN",
        ema20:0,
        ema80:0,
        atrPct:0,
        trendStrength:0,
        slope:0
    };

    let s120 = d.slice(i-120, i);
    let s60 = d.slice(i-60, i);
    let s30 = d.slice(i-30, i);

    let closes120 = s120.map(x=>x.close);
    let closes60 = s60.map(x=>x.close);
    let closes30 = s30.map(x=>x.close);

    let ema20 = ema(closes120, 20);
    let ema80 = ema(closes120, 80);

    let ema20Now = ema(closes30, 20);
    let ema20Past = ema(closes60.slice(0,30), 20);

    let slope = (ema20Now - ema20Past) / d[i].close;

    let currentAtr = atr(d, i, 14);
    let atrPct = currentAtr / d[i].close;

    let trendStrength = Math.abs(ema20 - ema80) / d[i].close;

    if(atrPct > 0.035){
        return {
            state:"VOLATILE",
            ema20,
            ema80,
            atrPct,
            trendStrength,
            slope
        };
    }

    if(ema20 > ema80 && slope > 0.0005 && trendStrength > 0.004){
        return {
            state:"TREND_UP",
            ema20,
            ema80,
            atrPct,
            trendStrength,
            slope
        };
    }

    if(ema20 < ema80 && slope < -0.0005 && trendStrength > 0.004){
        return {
            state:"TREND_DOWN",
            ema20,
            ema80,
            atrPct,
            trendStrength,
            slope
        };
    }

    return {
        state:"RANGE",
        ema20,
        ema80,
        atrPct,
        trendStrength,
        slope
    };
}

// ==========================
// 风险过滤：防插针 / 防极端波动
// ==========================
function riskFilter(d, i){
    let c = d[i];

    let body = Math.max(Math.abs(c.open - c.close), c.close * 0.0001);
    let upperWick = c.high - Math.max(c.open, c.close);
    let lowerWick = Math.min(c.open, c.close) - c.low;

    if(upperWick / body > 4 || lowerWick / body > 4){
        return false;
    }

    let rangePct = (c.high - c.low) / c.close;

    if(rangePct > 0.035){
        return false;
    }

    return true;
}

// ==========================
// 信号评分系统
// ==========================
function scoreTrendLong(d, i, ms){
    let s20 = d.slice(i-20, i);
    let s50 = d.slice(i-50, i);

    let price = d[i].close;
    let prevHigh20 = max(s20.map(x=>x.high));
    let prevHigh50 = max(s50.map(x=>x.high));
    let volAvg20 = avg(s20.map(x=>x.vol));

    let score = 0;
    let reasons = [];

    if(ms.state === "TREND_UP"){
        score++;
        reasons.push("TREND_UP");
    }

    if(price > prevHigh20){
        score++;
        reasons.push("突破20高");
    }

    if(price > prevHigh50 * 0.995){
        score++;
        reasons.push("接近/突破50高");
    }

    if(ms.ema20 > ms.ema80){
        score++;
        reasons.push("EMA多头");
    }

    if(ms.slope > 0.0005){
        score++;
        reasons.push("斜率向上");
    }

    if(d[i].vol > volAvg20 * 1.2){
        score++;
        reasons.push("放量");
    }

    if(ms.atrPct > 0.003 && ms.atrPct < 0.03){
        score++;
        reasons.push("ATR正常");
    }

    return {
        score,
        reasons
    };
}

function scoreTrendShort(d, i, ms){
    let s20 = d.slice(i-20, i);
    let s50 = d.slice(i-50, i);

    let price = d[i].close;
    let prevLow20 = min(s20.map(x=>x.low));
    let prevLow50 = min(s50.map(x=>x.low));
    let volAvg20 = avg(s20.map(x=>x.vol));

    let score = 0;
    let reasons = [];

    if(ms.state === "TREND_DOWN"){
        score++;
        reasons.push("TREND_DOWN");
    }

    if(price < prevLow20){
        score++;
        reasons.push("跌破20低");
    }

    if(price < prevLow50 * 1.005){
        score++;
        reasons.push("接近/跌破50低");
    }

    if(ms.ema20 < ms.ema80){
        score++;
        reasons.push("EMA空头");
    }

    if(ms.slope < -0.0005){
        score++;
        reasons.push("斜率向下");
    }

    if(d[i].vol > volAvg20 * 1.2){
        score++;
        reasons.push("放量");
    }

    if(ms.atrPct > 0.003 && ms.atrPct < 0.03){
        score++;
        reasons.push("ATR正常");
    }

    return {
        score,
        reasons
    };
}

// ==========================
// 可选 RANGE 策略，默认关闭
// ==========================
function rangeSignal(d, i){
    let s20 = d.slice(i-20, i);
    let mean = avg(s20.map(x=>x.close));
    let currentAtr = atr(d, i, 14);
    let price = d[i].close;

    if(price < mean - currentAtr * 1.2){
        return {
            direction:"LONG",
            strategy:"RANGE_LONG",
            score:3,
            reasons:["均值回归做多"]
        };
    }

    if(price > mean + currentAtr * 1.2){
        return {
            direction:"SHORT",
            strategy:"RANGE_SHORT",
            score:3,
            reasons:["均值回归做空"]
        };
    }

    return null;
}

// ==========================
// 总信号函数
// 信号在第 i 根K线收盘后确认，下一根K线开盘执行
// ==========================
function signal(d, i, params){
    if(i < 160) return null;

    if(!riskFilter(d, i)) return null;

    let ms = marketState(d, i);

    if(ms.state === "UNKNOWN" || ms.state === "VOLATILE"){
        return null;
    }

    let longScore = scoreTrendLong(d, i, ms);
    let shortScore = scoreTrendShort(d, i, ms);

    if(longScore.score >= params.minScore && ms.state === "TREND_UP"){
        return {
            direction:"LONG",
            strategy:"TREND_LONG",
            score:longScore.score,
            reasons:longScore.reasons,
            marketState:ms.state
        };
    }

    if(shortScore.score >= params.minScore && ms.state === "TREND_DOWN"){
        return {
            direction:"SHORT",
            strategy:"TREND_SHORT",
            score:shortScore.score,
            reasons:shortScore.reasons,
            marketState:ms.state
        };
    }

    if(params.enableRange){
        let r = rangeSignal(d, i);
        if(r){
            return {
                ...r,
                marketState:ms.state
            };
        }
    }

    return null;
}

// ==========================
// 标准仓位模型
// ==========================
function calcNotional(capital, riskPct, stopLossPct, maxExposure){
    let riskAmount = capital * riskPct;
    let rawNotional = riskAmount / stopLossPct;
    let maxNotional = capital * maxExposure;

    return Math.min(rawNotional, maxNotional);
}

// ==========================
// 开仓
// ==========================
function openPosition(sig, rawPrice, capital, params){
    let notional = calcNotional(
        capital,
        params.riskPct,
        params.stopLossPct,
        params.maxExposure
    );

    if(notional <= 0) return null;

    let entry;

    if(sig.direction === "LONG"){
        entry = rawPrice * (1 + params.slippagePct);
    }else{
        entry = rawPrice * (1 - params.slippagePct);
    }

    let openFee = notional * params.feePct;

    return {
        direction:sig.direction,
        strategy:sig.strategy,
        score:sig.score,
        reasons:sig.reasons,
        marketState:sig.marketState,
        entry,
        notional,
        openFee,
        barsHeld:0
    };
}

// ==========================
// 平仓判断
// ==========================
function checkExit(pos, bar, params){
    pos.barsHeld++;

    let sl = params.stopLossPct;
    let tp = params.takeProfitPct;

    let exitPrice = null;
    let reason = null;

    if(pos.direction === "LONG"){
        let stop = pos.entry * (1 - sl);
        let take = pos.entry * (1 + tp);

        if(bar.low <= stop){
            exitPrice = stop * (1 - params.slippagePct);
            reason = "STOP";
        }else if(bar.high >= take){
            exitPrice = take * (1 - params.slippagePct);
            reason = "TAKE";
        }
    }

    if(pos.direction === "SHORT"){
        let stop = pos.entry * (1 + sl);
        let take = pos.entry * (1 - tp);

        if(bar.high >= stop){
            exitPrice = stop * (1 + params.slippagePct);
            reason = "STOP";
        }else if(bar.low <= take){
            exitPrice = take * (1 + params.slippagePct);
            reason = "TAKE";
        }
    }

    if(!exitPrice && pos.barsHeld >= params.maxBarsHeld){
        exitPrice = bar.close;
        reason = "TIME_EXIT";
    }

    if(!exitPrice) return null;

    return {
        exitPrice,
        reason
    };
}

// ==========================
// 平仓标准PnL计算
// 手续费修复点：
// openFee 只在这里扣一次，不在开仓时提前扣。
// ==========================
function closePosition(pos, exitPrice, capital, params){
    let directionNum = pos.direction === "LONG" ? 1 : -1;

    let pnlPct = directionNum * (exitPrice - pos.entry) / pos.entry;
    let grossPnl = pos.notional * pnlPct;
    let closeFee = pos.notional * params.feePct;

    let totalFee = pos.openFee + closeFee;
    let netPnl = grossPnl - totalFee;

    let capitalBefore = capital;
    let capitalAfter = capital + netPnl;

    return {
        capitalAfter,
        trade:{
            direction:pos.direction,
            strategy:pos.strategy,
            marketState:pos.marketState,
            score:pos.score,
            reasons:pos.reasons,
            entry:pos.entry,
            exit:exitPrice,
            notional:pos.notional,
            pnlPct,
            grossPnl,
            openFee:pos.openFee,
            closeFee,
            totalFee,
            netPnl,
            returnOnCapital:netPnl / capitalBefore,
            barsHeld:pos.barsHeld
        }
    };
}

// ==========================
// 分策略统计
// ==========================
function calcStrategyStats(trades){
    let map = {};

    for(let t of trades){
        if(!map[t.strategy]){
            map[t.strategy] = {
                count:0,
                wins:0,
                losses:0,
                netPnl:0,
                grossProfit:0,
                grossLoss:0,
                avgScore:0
            };
        }

        let s = map[t.strategy];

        s.count++;
        s.netPnl += t.netPnl;
        s.avgScore += t.score || 0;

        if(t.netPnl > 0){
            s.wins++;
            s.grossProfit += t.netPnl;
        }else{
            s.losses++;
            s.grossLoss += Math.abs(t.netPnl);
        }
    }

    for(let k in map){
        let s = map[k];
        s.winRate = s.count ? s.wins / s.count : 0;
        s.profitFactor = s.grossLoss === 0 ? 999 : s.grossProfit / s.grossLoss;
        s.avgScore = s.count ? s.avgScore / s.count : 0;
    }

    return map;
}

// ==========================
// 回测主函数
// ==========================
function run(){
    let initialCapital = num("initialCapital");

    let params = {
        bars:num("bars"),
        seed:num("seed"),
        riskPct:num("riskPct") / 100,
        stopLossPct:num("stopLoss") / 100,
        takeProfitPct:num("takeProfit") / 100,
        maxExposure:num("maxExposure"),
        maxDDLimit:num("maxDDLimit") / 100,
        feePct:num("feePct") / 100,
        slippagePct:num("slippagePct") / 100,
        minScore:num("minScore"),
        enableRange:num("enableRange") === 1,
        maxBarsHeld:100
    };

    let d = genData(params.bars, params.seed);

    let capital = initialCapital;
    let peak = initialCapital;
    let maxDD = 0;

    let position = null;
    let trades = [];

    let cooldown = 0;
    let consecutiveLoss = 0;

    let stoppedReason = "正常完成";

    let skipped = {
        cooldown:0,
        noSignal:0
    };

    function updateDrawdown(){
        if(capital > peak){
            peak = capital;
        }

        let dd = (peak - capital) / peak;

        if(dd > maxDD){
            maxDD = dd;
        }

        return dd;
    }

    for(let i=170;i<d.length-1;i++){

        if(capital <= 0){
            capital = 0;
            stoppedReason = "资金归零";
            break;
        }

        let dd = updateDrawdown();

        if(dd >= params.maxDDLimit){
            stoppedReason = "最大回撤超过限制，停止交易";
            break;
        }

        let nextBar = d[i+1];

        // 先处理持仓
        if(position){
            let exit = checkExit(position, nextBar, params);

            if(exit){
                let result = closePosition(position, exit.exitPrice, capital, params);
                capital = result.capitalAfter;

                result.trade.reason = exit.reason;
                result.trade.capitalAfter = capital;

                trades.push(result.trade);

                if(result.trade.netPnl < 0){
                    consecutiveLoss++;
                }else{
                    consecutiveLoss = 0;
                }

                if(consecutiveLoss >= 3){
                    cooldown = 40;
                    consecutiveLoss = 0;
                }

                position = null;

                dd = updateDrawdown();

                if(dd >= params.maxDDLimit){
                    stoppedReason = "最大回撤超过限制，停止交易";
                    break;
                }
            }
        }

        if(cooldown > 0){
            cooldown--;
            skipped.cooldown++;
            continue;
        }

        // 无持仓才允许开仓
        if(!position){
            let sig = signal(d, i, params);

            if(sig){
                position = openPosition(sig, nextBar.open, capital, params);

                // 关键修复：
                // 这里不再执行 capital -= position.openFee;
                // 开仓手续费统一在平仓时和closeFee一起扣除。
            }else{
                skipped.noSignal++;
            }
        }
    }

    let wins = trades.filter(t=>t.netPnl > 0);
    let losses = trades.filter(t=>t.netPnl <= 0);

    let grossProfit = wins.reduce((a,b)=>a+b.netPnl,0);
    let grossLoss = Math.abs(losses.reduce((a,b)=>a+b.netPnl,0));

    let winRate = trades.length ? wins.length / trades.length : 0;
    let profitFactor = grossLoss === 0 ? 999 : grossProfit / grossLoss;

    let avgWin = wins.length ? grossProfit / wins.length : 0;
    let avgLoss = losses.length ? grossLoss / losses.length : 0;

    let totalFees = trades.reduce((a,b)=>a+b.totalFee,0);

    let strategyStats = calcStrategyStats(trades);

    lastReport = {
        version:"V7.3.1 强趋势过滤量化回测引擎_手续费修复版",
        feeBugFixed:true,
        stoppedReason,
        initialCapital,
        finalCapital:capital,
        returnRate:(capital - initialCapital) / initialCapital,
        maxDrawdown:maxDD,
        tradesCount:trades.length,
        winRate,
        profitFactor,
        avgWin,
        avgLoss,
        totalFees,
        params,
        strategyStats,
        skipped,
        lastTrades:trades.slice(-50)
    };

    let strategyText = "";

    for(let k in strategyStats){
        let s = strategyStats[k];
        strategyText += `
${k}：
  交易次数：${s.count}
  胜率：${(s.winRate*100).toFixed(2)}%
  净收益：${s.netPnl.toFixed(4)}
  Profit Factor：${s.profitFactor.toFixed(2)}
  平均评分：${s.avgScore.toFixed(2)}
`;
    }

    if(!strategyText){
        strategyText = "暂无交易";
    }

    document.getElementById("out").innerText =
`【V7.3.1 手续费修复版回测报告】

停止原因：${stoppedReason}

初始资金：${initialCapital.toFixed(2)}
最终资金：${capital.toFixed(2)}
收益率：${(((capital-initialCapital)/initialCapital)*100).toFixed(2)}%

最大回撤：${(maxDD*100).toFixed(2)}%
交易次数：${trades.length}
胜率：${(winRate*100).toFixed(2)}%
Profit Factor：${profitFactor.toFixed(2)}
平均盈利：${avgWin.toFixed(4)}
平均亏损：${avgLoss.toFixed(4)}
总手续费：${totalFees.toFixed(4)}

【分策略统计】
${strategyText}

【参数】
随机种子：${params.seed}
单笔风险：${(params.riskPct*100).toFixed(2)}%
止损：${(params.stopLossPct*100).toFixed(2)}%
止盈：${(params.takeProfitPct*100).toFixed(2)}%
最大名义仓位：${params.maxExposure}x
最大回撤熔断：${(params.maxDDLimit*100).toFixed(2)}%
手续费：${(params.feePct*100).toFixed(3)}%
滑点：${(params.slippagePct*100).toFixed(3)}%
最低信号评分：${params.minScore}
RANGE策略：${params.enableRange ? "开启" : "关闭"}

// 一键复制
// ==========================
function copyReport(){
    if(!lastReport){
        alert("请先运行回测");
        return;
    }

    let text = JSON.stringify(lastReport, null, 2);

    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(()=>{
            alert("已复制，可直接粘贴给ChatGPT分析");
        }).catch(()=>{
            fallbackCopy(text);
        });
    }else{
        fallbackCopy(text);
    }
}

function fallbackCopy(text){
    let textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    document.body.removeChild(textarea);
    alert("已复制，可直接粘贴给ChatGPT分析");
}
