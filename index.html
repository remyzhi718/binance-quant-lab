<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V7 完整量化系统</title>
<style>
body{background:#0b1220;color:#fff;font-family:Arial;padding:20px}
button{padding:12px;width:100%}
pre{background:#162033;padding:10px;white-space:pre-wrap}
</style>
</head>

<body>

<h2>🚀 V7 完整资金管理量化系统</h2>

<button onclick="run()">开始回测</button>

<pre id="out">等待...</pre>

<script>

// ======================
// 数据生成
// ======================
function gen(){
    let d=[],p=100;
    for(let i=0;i<20000;i++){
        p += (Math.random()-0.5)*2;
        d.push({
            open:p,
            close:p+(Math.random()-0.5),
            high:p+Math.random(),
            low:p-Math.random(),
            vol:Math.random()*100
        });
    }
    return d;
}

// ======================
// EMA
// ======================
function ema(arr){
    let k=2/(arr.length+1);
    let e=arr[0];
    for(let i=1;i<arr.length;i++){
        e=arr[i]*k+e*(1-k);
    }
    return e;
}

// ======================
// 市场状态
// ======================
function marketState(d,i){

    let s=d.slice(i-20,i);

    let highs=s.map(x=>x.high);
    let lows=s.map(x=>x.low);

    let range=Math.max(...highs)-Math.min(...lows);

    if(range>6) return "VOLATILE";
    if(range<2) return "RANGE";
    return "TREND";
}

// ======================
// 趋势策略
// ======================
function trendStrategy(d,i){

    let s=d.slice(i-20,i);

    let price=d[i].close;

    let high20=Math.max(...s.map(x=>x.high));

    let volAvg=s.reduce((a,b)=>a+b.vol,0)/s.length;

    if(price>high20 && d[i].vol>volAvg*1.2){
        return "LONG";
    }

    return null;
}

// ======================
// 震荡策略
// ======================
function rangeStrategy(d,i){

    let s=d.slice(i-20,i);

    let avg=s.reduce((a,b)=>a+b.close,0)/s.length;

    let price=d[i].close;

    if(price < avg*0.99) return "LONG";
    if(price > avg*1.01) return "SHORT";

    return null;
}

// ======================
// 资金管理（核心V7）
// ======================
function positionSize(capital, drawdown){

    let risk = 0.01; // 1%风险

    if(drawdown > 0.12) return 0;
    if(drawdown > 0.08) risk = 0.005;

    let stopLoss = 0.015;

    return (capital * risk) / stopLoss;
}

// ======================
// 信号系统
// ======================
function signal(d,i){

    let state=marketState(d,i);

    if(state==="VOLATILE") return null;

    if(state==="TREND") return trendStrategy(d,i);

    if(state==="RANGE") return rangeStrategy(d,i);

    return null;
}

// ======================
// 回测引擎（V7核心）
// ======================
function run(){

let d=gen();

let capital=300;
let peak=300;
let pos=null;
let trades=[];

for(let i=50;i<d.length-1;i++){

    let sig=signal(d,i);
    let next=d[i+1];

    // ===== 回撤计算 =====
    let dd=(capital-peak)/peak;

    if(capital>peak) peak=capital;

    // ===== 资金归零保护 =====
    if(capital < 50) break;

    // ===== 持仓管理 =====
    if(pos){

        let pnl=(next.close-pos.entry)/pos.entry;

        capital += capital * pnl * pos.size;

        trades.push(pnl);

        pos=null;
    }

    // ===== 开仓 =====
    if(sig==="LONG" && !pos){

        let size = positionSize(capital, dd);

        if(size > 0){

            pos = {
                entry: next.close,
                size: size / capital
            };
        }
    }
}

// ======================
// 统计
// ======================
let win=trades.filter(x=>x>0).length;

document.getElementById("out").innerText=`
【V7完整系统回测】

最终资金：${capital.toFixed(2)}
收益率：${((capital-300)/300*100).toFixed(2)}%
交易次数：${trades.length}
胜率：${(win/(trades.length||1)*100).toFixed(2)}%
最大回撤：${((capital-peak)/peak*100).toFixed(2)}%

状态：
✔ 市场切换
✔ 动态仓位
✔ 1%风险控制
✔ 防爆仓机制
`;
}

</script>

</body>
</html>
