<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>V7 回测一键版</title>
<style>
body{background:#0b1220;color:white;font-family:Arial;padding:20px}
button{padding:12px;width:100%;margin-top:10px}
pre{background:#162033;padding:10px;border-radius:10px;white-space:pre-wrap}
</style>
</head>

<body>

<h2>🚀 V7 一键回测（简化版）</h2>

<button onclick="run()">开始回测</button>

<pre id="out">等待...</pre>

<script>

// ===== 模拟K线 =====
function gen(){
    let d=[],p=100;
    for(let i=0;i<2000;i++){
        p += (Math.random()-0.5)*2;
        d.push({
            open:p,
            close:p+(Math.random()-0.5),
            high:p+Math.random(),
            low:p-Math.random(),
            vol:Math.random()*100
        });
    }
    return d;
}

// ===== 信号 =====
function signal(d,i){
    if(i<50) return null;

    let s=d.slice(i-20,i);

    let high=Math.max(...s.map(x=>x.high));
    let volAvg=s.reduce((a,b)=>a+b.vol,0)/s.length;

    let c=d[i];

    // 防插针
    let body=Math.abs(c.open-c.close);
    let wick=c.high-Math.max(c.open,c.close);
    if(wick>body*2.5) return null;

    // 趋势突破
    if(c.close>high && c.vol>volAvg*1.2){
        return "LONG";
    }

    return null;
}

// ===== 回测 =====
function run(){

let d=gen();
let capital=300;
let pos=null;
let trades=[];

for(let i=50;i<d.length-1;i++){

    let sig=signal(d,i);
    let next=d[i+1];

    if(pos){

        let pnl=(next.close-pos.entry)/pos.entry;

        if(pnl>0.03 || pnl<-0.015){
            capital+=capital*pnl;
            pos=null;
            trades.push(pnl);
        }
    }

    if(sig==="LONG" && !pos){
        pos={entry:next.close};
    }
}

let win=trades.filter(x=>x>0).length;
let lose=trades.length-win;

document.getElementById("out").innerText=`
最终资金：${capital.toFixed(2)}
收益率：${((capital-300)/300*100).toFixed(2)}%
交易次数：${trades.length}
胜率：${(win/(win+lose||1)*100).toFixed(2)}%
`;
}

</script>

</body>
</html>
