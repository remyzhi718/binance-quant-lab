<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V5 防过拟合回测</title>
<style>
body{background:#0b1220;color:#fff;font-family:Arial;padding:20px}
button{padding:12px;width:100%}
pre{background:#162033;padding:10px;white-space:pre-wrap}
</style>
</head>

<body>

<h2>🚀 V5 防过拟合回测系统</h2>

<button onclick="run()">开始回测</button>

<pre id="out">等待...</pre>

<script>

// ===== 模拟数据 =====
function gen(){
    let d=[],p=100;
    for(let i=0;i<20000;i++){
        p += (Math.random()-0.5)*2;
        d.push({
            open:p,
            close:p+(Math.random()-0.5),
            high:p+Math.random(),
            low:p-Math.random(),
            vol:Math.random()*100
        });
    }
    return d;
}

// ===== EMA =====
function ema(arr){
    let k=2/(arr.length+1);
    let e=arr[0];
    for(let i=1;i<arr.length;i++){
        e=arr[i]*k+e*(1-k);
    }
    return e;
}

// ===== 策略（V4结构 + V5使用）=====
function signal(d,i,p){

    if(i<50) return null;

    let s=d.slice(i-20,i);

    let price=d[i].close;

    let high20=Math.max(...s.map(x=>x.high));
    let volAvg=s.reduce((a,b)=>a+b.vol,0)/s.length;

    let ema100=ema(s.map(x=>x.close));

    // 趋势过滤
    if(price < ema100) return null;

    // 震荡过滤（简单版）
    let range = Math.max(...s.map(x=>x.high)) - Math.min(...s.map(x=>x.low));
    if(range < 1) return null;

    // 放量突破
    if(price > high20 && d[i].vol > volAvg * 1.2){
        return "LONG";
    }

    return null;
}

// ===== 回测核心 =====
function backtest(data){

    let capital=300;
    let pos=null;
    let trades=[];

    for(let i=50;i<data.length-1;i++){

        let sig=signal(data,i);
        let next=data[i+1];

        if(pos){

            let pnl=(next.close-pos.entry)/pos.entry;

            if(pnl>0.03 || pnl<-0.015){
                capital+=capital*pnl;
                pos=null;
                trades.push(pnl);
            }
        }

        if(sig==="LONG" && !pos){
            pos={entry:next.close};
        }
    }

    let win=trades.filter(x=>x>0).length;

    return {
        return:(capital-300)/300,
        winRate:win/(trades.length||1),
        trades,
        dd:Math.min(...trades,0)
    };
}

// ===== V5 Walk Forward =====
function walkForward(data){

    let a=data.slice(0,10000);
    let b=data.slice(10000,15000);
    let c=data.slice(15000,20000);

    let r1=backtest(a);
    let r2=backtest(b);
    let r3=backtest(c);

    let score =
        r1.return*0.4 +
        r2.return*0.4 +
        r3.return*0.2 -
        Math.abs(r3.dd)*0.7;

    return {
        train:r1,
        validate:r2,
        test:r3,
        score
    };
}

// ===== 运行 =====
function run(){

let data=gen();

let result=walkForward(data);

document.getElementById("out").innerText=`
【V5防过拟合回测】

=== 训练集 ===
收益：${(result.train.return*100).toFixed(2)}%
胜率：${(result.train.winRate*100).toFixed(2)}%

=== 验证集 ===
收益：${(result.validate.return*100).toFixed(2)}%
胜率：${(result.validate.winRate*100).toFixed(2)}%

=== 测试集 ===
收益：${(result.test.return*100).toFixed(2)}%
胜率：${(result.test.winRate*100).toFixed(2)}%

=== 综合评分 ===
${result.score.toFixed(4)}

可复制AI分析：
${JSON.stringify(result,null,2)}
`;
}

</script>

</body>
</html>
