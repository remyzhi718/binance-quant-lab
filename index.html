<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>简易量化回测 V1</title>
<style>
body{background:#0b1220;color:white;font-family:Arial;padding:20px}
button{padding:10px;width:100%;margin-top:10px}
.card{background:#162033;padding:15px;border-radius:10px}
pre{white-space:pre-wrap}
</style>
</head>

<body>

<h2>🚀 简易回测系统 V1</h2>

<div class="card">
<button onclick="run()">开始回测</button>
</div>

<div class="card">
<pre id="out">等待运行...</pre>
</div>

<script>

// ===== 模拟K线（避免接口问题）=====
function generateData(){
    let data=[];
    let price=100;
    for(let i=0;i<500;i++){
        let change=(Math.random()-0.5)*2;
        price+=change;

        data.push({
            open:price,
            close:price+(Math.random()-0.5),
            high:price+Math.random(),
            low:price-Math.random(),
            vol:Math.random()*100
        });
    }
    return data;
}

// ===== 简单策略 =====
function signal(data,i){
    if(i<20) return null;

    let slice=data.slice(i-20,i);
    let high20=Math.max(...slice.map(x=>x.high));

    if(data[i].close>high20){
        return "LONG";
    }
    return null;
}

// ===== 回测 =====
function run(){

let data=generateData();

let capital=300;
let position=null;
let trades=[];

for(let i=20;i<data.length;i++){

    let sig=signal(data,i);

    let price=data[i].close;

    if(position){

        let pnl=(price-position.entry)/position.entry;

        if(pnl>0.03 || pnl<-0.015){
            capital+=capital*pnl;
            position=null;
            trades.push(pnl);
        }
    }

    if(sig==="LONG" && !position){
        position={entry:price};
    }
}

let win=trades.filter(x=>x>0).length;
let lose=trades.filter(x=>x<=0).length;

document.getElementById("out").innerText=`
最终资金：${capital.toFixed(2)}
收益率：${((capital-300)/300*100).toFixed(2)}%
交易次数：${trades.length}
胜率：${(win/(win+lose||1)*100).toFixed(2)}%
`;
}

</script>

</body>
</html>
